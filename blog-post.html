<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статья блога — TechRobot</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <!-- DOMPurify для санитизации HTML-контента на клиенте (whitelist тегов) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/DOMPurify/3.0.8/purify.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    .page-main { padding-top: 70px; }

    .post-hero {
      padding: 2.5rem 0 1.5rem;
      background: linear-gradient(180deg, var(--bg-dark2) 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--border);
    }

    .post-wrapper {
      max-width: 820px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
    }

    .post-cover {
      width: 100%;
      aspect-ratio: 21/9;
      object-fit: cover;
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      background: var(--bg-dark2);
    }
    .post-cover-placeholder {
      width: 100%;
      aspect-ratio: 21/9;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      font-size: 5rem;
    }

    .post-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-family: var(--font-heading);
      font-weight: 900;
      line-height: 1.25;
      margin: 0.5rem 0 1rem;
    }

    .post-meta-bar {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      color: var(--text-muted);
      font-size: 0.88rem;
      flex-wrap: wrap;
    }

    .post-author-block {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--text-secondary);
    }

    /* Контент статьи (после санитизации) */
    .post-content {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-primary);
    }
    .post-content h2,
    .post-content h3,
    .post-content h4 {
      font-family: var(--font-heading);
      color: var(--text-primary);
      margin: 1.6rem 0 0.75rem;
    }
    .post-content h2 { font-size: 1.5rem; }
    .post-content h3 { font-size: 1.25rem; }
    .post-content h4 { font-size: 1.1rem; }
    .post-content p { margin-bottom: 1rem; color: var(--text-secondary); }
    .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .post-content li { margin-bottom: 0.4rem; color: var(--text-secondary); }
    .post-content a { color: var(--primary); }
    .post-content code {
      background: var(--bg-dark2);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
    }
    .post-content pre {
      background: var(--bg-dark2);
      padding: 1rem;
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin: 1rem 0;
    }
    .post-content blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 1rem;
      margin: 1rem 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-md);
      margin: 1rem 0;
    }

    .post-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .post-wrapper { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="page-main" id="main-content">

    <div class="post-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="Навигация">
          <a href="index.html">Главная</a>
          <span class="breadcrumb-sep">›</span>
          <a href="blog.html">Блог сообщества</a>
          <span class="breadcrumb-sep">›</span>
          <span id="crumbTitle">Статья</span>
        </nav>
      </div>
    </div>

    <section class="section" aria-label="Статья">
      <div class="container">
        <div id="postContainer">
          <!-- скелетон -->
          <div class="post-wrapper">
            <div class="skeleton" style="aspect-ratio:21/9;border-radius:var(--radius-lg);margin-bottom:1.5rem;"></div>
            <div class="skeleton" style="height:40px;border-radius:var(--radius-sm);margin-bottom:1rem;"></div>
            <div class="skeleton" style="height:200px;border-radius:var(--radius-sm);"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/blog-post.js"></script>
</body>
</html>
