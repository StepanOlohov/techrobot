<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Поиск по статьям, новостям и каталогу роботов TechRobot">
  <title>Поиск — TechRobot</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .page-main { padding-top: 70px; }

    /* Hero поиска */
    .search-hero {
      padding: 3rem 0 2rem;
      background: linear-gradient(180deg, var(--bg-dark2) 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--border);
    }

    /* Большое поле поиска */
    .search-input-large {
      position: relative;
      max-width: 700px;
      margin: 1.5rem auto 0;
    }

    .search-input-large input {
      width: 100%;
      padding: 1.1rem 1.25rem 1.1rem 3.5rem;
      font-size: 1.1rem;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-xl);
      color: var(--text-primary);
      font-family: var(--font-main);
      outline: none;
      transition: all var(--transition);
    }
    .search-input-large input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }
    .search-input-large input::placeholder { color: var(--text-muted); }

    .search-big-icon {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      pointer-events: none;
    }

    /* Статистика результатов */
    .search-results-count {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .search-results-count strong { color: var(--text-primary); }
    .search-results-count em { color: var(--primary); font-style: normal; }

    /* Секция результатов */
    .search-section {
      margin-bottom: 2.5rem;
    }

    .search-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      background: var(--primary-glow);
      color: var(--primary);
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    /* Элемент результата */
    .search-results-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .search-result-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: all var(--transition);
      cursor: pointer;
    }

    .search-result-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .search-result-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-result-body { flex: 1; min-width: 0; }

    .search-result-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }

    .search-result-date {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .search-result-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }

    .search-result-preview {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Подсказки быстрого поиска */
    .search-suggestions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      justify-content: center;
    }

    .search-suggestion {
      padding: 0.35rem 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.83rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
    }
    .search-suggestion:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="page-main" id="main-content">

    <!-- Hero с полем поиска -->
    <div class="search-hero">
      <div class="container" style="text-align:center;">
        <nav class="breadcrumb" style="justify-content:center;" aria-label="Навигация">
          <a href="index.html">Главная</a>
          <span class="breadcrumb-sep">›</span>
          <span>Поиск</span>
        </nav>
        <h1 style="font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:0.5rem;">Поиск</h1>
        <p style="color:var(--text-secondary);">По статьям, новостям и каталогу роботов</p>

        <!-- Поле поиска -->
        <div class="search-input-large">
          <span class="search-big-icon" aria-hidden="true">🔍</span>
          <input
            type="search"
            id="searchInput"
            placeholder="Введите запрос — например: ChatGPT, Atlas, дроны..."
            autocomplete="off"
            spellcheck="false"
            aria-label="Поиск по сайту"
            maxlength="150"
          >
        </div>

        <!-- Статус результатов -->
        <div id="searchStats" style="margin-top:0.75rem;font-size:0.88rem;color:var(--text-muted);min-height:1.2rem;"></div>

        <!-- Быстрые подсказки -->
        <div class="search-suggestions" role="list" aria-label="Быстрые поисковые запросы">
          <a href="?q=ChatGPT" class="search-suggestion" role="listitem">ChatGPT</a>
          <a href="?q=Boston+Dynamics" class="search-suggestion" role="listitem">Boston Dynamics</a>
          <a href="?q=Tesla+Optimus" class="search-suggestion" role="listitem">Tesla Optimus</a>
          <a href="?q=нейросети" class="search-suggestion" role="listitem">Нейросети</a>
          <a href="?q=Atlas" class="search-suggestion" role="listitem">Atlas</a>
          <a href="?q=беспилотники" class="search-suggestion" role="listitem">Беспилотники</a>
          <a href="?q=CRISPR" class="search-suggestion" role="listitem">CRISPR</a>
          <a href="?q=IoT" class="search-suggestion" role="listitem">IoT</a>
        </div>
      </div>
    </div>

    <!-- Результаты поиска -->
    <section class="section" aria-label="Результаты поиска" aria-live="polite">
      <div class="container">
        <div id="searchResults" style="max-width:800px;margin:0 auto;">
          <!-- Начальное состояние — заполняется search.js -->
        </div>
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
