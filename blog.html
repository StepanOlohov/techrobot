<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Блог сообщества TechRobot — авторские статьи от пользователей о технологиях, ИИ и робототехнике">
  <title>Блог сообщества — TechRobot</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .page-main { padding-top: 70px; }

    .page-hero {
      padding: 3rem 0 2rem;
      background: linear-gradient(180deg, var(--bg-dark2) 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filters-bar {
      background: var(--bg-dark2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 70px;
      z-index: 100;
    }
    .filters-inner {
      max-width: var(--container);
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Пагинация */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      flex-wrap: wrap;
    }
    .pagination button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 0.9rem;
      transition: all 0.2s;
      min-width: 38px;
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
    }
    .pagination button.active {
      background: var(--primary);
      color: var(--bg-dark);
      border-color: var(--primary);
      font-weight: 700;
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .filters-inner { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="page-main" id="main-content">

    <!-- Hero -->
    <div class="page-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="Навигация">
          <a href="index.html">Главная</a>
          <span class="breadcrumb-sep">›</span>
          <span>Блог сообщества</span>
        </nav>
        <div class="hero-row">
          <div>
            <h1 style="font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:0.5rem;">Блог сообщества</h1>
            <p style="color:var(--text-secondary);">
              Авторские статьи от пользователей TechRobot —
              <span id="blogCount" style="color:var(--primary);font-weight:600;"></span>
            </p>
          </div>
          <a href="blog-editor.html" class="btn btn-primary" id="writeBtn" style="display:none;">
            ✍️ Написать статью
          </a>
        </div>
      </div>
    </div>

    <!-- Фильтры -->
    <div class="filters-bar" role="search" aria-label="Фильтры блога">
      <div class="filters-inner">
        <div class="filter-group" role="group" aria-label="Фильтр по категориям">
          <button class="filter-btn active" data-category="all">Все</button>
          <button class="filter-btn" data-category="ai">🤖 ИИ</button>
          <button class="filter-btn" data-category="robotics">⚙️ Роботы</button>
          <button class="filter-btn" data-category="iot">📡 IoT</button>
          <button class="filter-btn" data-category="vrar">🥽 VR/AR</button>
          <button class="filter-btn" data-category="biotech">🧬 Биотех</button>
          <button class="filter-btn" data-category="drones">🚁 Дроны</button>
        </div>
      </div>
    </div>

    <!-- Сетка карточек -->
    <section class="section" aria-label="Статьи блога">
      <div class="container">
        <div id="blogGrid" class="grid-3" style="min-height:400px;">
          <div class="skeleton" style="height:380px;border-radius:var(--radius-lg);"></div>
          <div class="skeleton" style="height:380px;border-radius:var(--radius-lg);"></div>
          <div class="skeleton" style="height:380px;border-radius:var(--radius-lg);"></div>
        </div>

        <!-- Пагинация -->
        <div id="pagination" class="pagination" aria-label="Пагинация"></div>
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
