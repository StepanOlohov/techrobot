<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тема форума — TechRobot</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .page-main { padding-top: 70px; }

    .topic-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2rem;
      align-items: start;
    }

    .topic-main { min-width: 0; }

    .topic-sidebar {
      position: sticky;
      top: 90px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* Заголовок темы */
    .topic-header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .topic-title-main {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 800;
      margin: 0.75rem 0;
      color: var(--text-primary);
    }

    /* Список сообщений */
    #forumMessages {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    /* Форма ответа */
    .reply-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.75rem;
    }

    .reply-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      color: var(--text-primary);
    }

    @media (max-width: 1024px) {
      .topic-layout { grid-template-columns: 1fr; }
      .topic-sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="page-main" id="main-content">
    <div class="container section">

      <!-- Хлебные крошки -->
      <nav class="breadcrumb" aria-label="Навигация">
        <a href="index.html">Главная</a>
        <span class="breadcrumb-sep">›</span>
        <a href="forum.html">Форум</a>
        <span class="breadcrumb-sep">›</span>
        <span id="topicBreadcrumb">Тема</span>
      </nav>

      <div class="topic-layout">
        <!-- Основная область -->
        <div class="topic-main">

          <!-- Заголовок темы -->
          <div class="topic-header">
            <div id="topicMeta" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem;"></div>
            <h1 class="topic-title-main" id="topicTitle">
              <div class="skeleton" style="height:2rem;border-radius:6px;max-width:600px;"></div>
            </h1>
          </div>

          <!-- Сообщения форума -->
          <div id="forumMessages">
            <div class="skeleton" style="height:120px;border-radius:var(--radius-md);"></div>
            <div class="skeleton" style="height:120px;border-radius:var(--radius-md);"></div>
          </div>

          <!-- Форма ответа / уведомление о входе -->
          <div id="replyLoginNotice"></div>

          <div class="reply-block" id="replyFormBlock">
            <div class="reply-title">✏️ Ваш ответ</div>
            <form id="replyForm">
              <div class="form-group">
                <textarea
                  name="message"
                  class="form-textarea"
                  placeholder="Напишите ваш ответ... (минимум 5 символов)"
                  style="min-height:120px;"
                  maxlength="2000"
                  aria-label="Текст ответа"
                ></textarea>
              </div>
              <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary">📤 Отправить ответ</button>
                <span style="font-size:0.82rem;color:var(--text-muted);">Ваши ответы сохраняются локально</span>
              </div>
            </form>
          </div>
        </div>

        <!-- Боковая панель -->
        <aside class="topic-sidebar">
          <div class="sidebar-block">
            <div class="sidebar-title">Навигация</div>
            <div style="display:flex;flex-direction:column;gap:0.5rem;">
              <a href="forum.html" class="btn btn-ghost btn-sm" style="justify-content:flex-start;gap:0.5rem;">← Все темы</a>
              <button class="btn btn-primary btn-sm" onclick="openAuthModal && openAuthModal('login')" id="sidebarReplyBtn">💬 Ответить</button>
            </div>
          </div>

          <div class="sidebar-block">
            <div class="sidebar-title">О форуме</div>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0;">
              Данные форума хранятся локально в вашем браузере (localStorage). Ваши ответы будут видны только вам.
            </p>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/forum.js"></script>
  <script>
    // Дополнительная логика страницы темы
    document.addEventListener('DOMContentLoaded', () => {
      // Обновляем хлебные крошки после загрузки заголовка
      const observer = new MutationObserver(() => {
        const titleEl = document.getElementById('topicTitle');
        const breadcrumb = document.getElementById('topicBreadcrumb');
        if (titleEl && breadcrumb && titleEl.textContent.trim()) {
          breadcrumb.textContent = titleEl.textContent.trim().slice(0, 50) + '...';
          observer.disconnect();
        }
      });

      const titleEl = document.getElementById('topicTitle');
      if (titleEl) observer.observe(titleEl, { childList: true, subtree: true });

      // Скролл к форме ответа
      const sidebarBtn = document.getElementById('sidebarReplyBtn');
      if (sidebarBtn) {
        sidebarBtn.addEventListener('click', () => {
          const replyBlock = document.getElementById('replyFormBlock');
          if (replyBlock) {
            replyBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const textarea = replyBlock.querySelector('textarea');
            if (textarea) setTimeout(() => textarea.focus(), 400);
          }
        });
      }
    });
  </script>
</body>
</html>
